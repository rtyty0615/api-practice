<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Practice</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div id="container">
        <label for="new-image">Enter New GIF: </label>
        <input type="text" id="new-image"/>
        <button>Generate</button>
        <img src="#">
    </div>

    <script>
        const btn = document.querySelector("button");
        btn.addEventListener("click", (event) => {
            const input = document.querySelector("#new-image");
            const nameGif = input.value.trim();
            if (nameGif === "") {
                alert("You cannot enter only space!");
                input.focus();
                return; 
            }
            const img = document.querySelector('img');
            async function getGif() {
                try {
                    const response = await fetch('https://api.giphy.com/v1/gifs/translate?api_key=pHVxU6gX6tTqrrhEkCr8jhpw2wA2gEt5&s=' + nameGif);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    };
                    gif = await response.json();
                    img.src = gif.data.images.original.url;
                } catch (error) {
                    console.error("Error fetching the image:", error);
                }
            }
            getGif();
            });
    </script>

</body>
</html>
